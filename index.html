<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>KNIGHT'S TOUR • NEON SPECTER SYS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        /* Sistema Colori Neon Centralizzato - Eredità Neon Specter */
        :root {
            --ui-hue: 180; /* Partenza: Ciano Spettrale (Neon Specter Signature) */
            --neon-pri: hsl(var(--ui-hue), 100%, 55%);
            --neon-sec: hsl(calc(var(--ui-hue) + 40), 100%, 75%);
            --neon-glow: hsl(var(--ui-hue), 100%, 50%);
            --neon-bg: hsla(var(--ui-hue), 100%, 12%, 0.85);
            --neon-bg-light: hsla(var(--ui-hue), 100%, 50%, 0.15);
            --neon-shadow: 0 0 12px var(--neon-glow), 0 0 25px var(--neon-glow);
            --neon-shadow-intense: 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow), 0 0 60px var(--neon-glow);
        }

        /* Reset and Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            overflow: hidden; background: #000; color: var(--neon-pri);
            font-family: 'VT323', monospace; 
            width: 100%; height: 100dvh; 
            position: relative; overscroll-behavior: none;
            user-select: none; -webkit-user-select: none;
            transition: color 0.8s ease;
        }

        /* Overlay Inizializzazione Grafico */
        #init-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background: rgba(0, 8, 8, 0.95); z-index: 999999; display: flex; align-items: center; 
            justify-content: center; cursor: pointer;
        }
        
        .init-icon {
            width: clamp(80px, 20vw, 150px); height: clamp(80px, 20vw, 150px);
            animation: pulse-icon 1.5s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 20px var(--neon-glow)) drop-shadow(0 0 40px var(--neon-glow));
            transition: filter 0.8s ease;
        }
        .init-icon circle, .init-icon polygon { stroke: var(--neon-pri); transition: stroke 0.8s ease, fill 0.8s ease; }
        .init-icon polygon { fill: var(--neon-pri); }
        
        @keyframes pulse-icon {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        #matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; image-rendering: pixelated; pointer-events: none; opacity: 0.85;
        }

        .knight {
            position: fixed; top: 50%; transform: translateY(-50%);
            font-size: 15vw; color: var(--neon-pri);
            text-shadow: var(--neon-shadow-intense);
            z-index: 2; pointer-events: none; opacity: 0.93; filter: brightness(1.2);
            animation: knight-flicker 2s infinite alternate; will-change: opacity;
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }
        .knight-left  { left: 40px; transform: translateY(-50%) scaleX(-1); }
        .knight-right { right: 40px; transform: translateY(-50%) scaleX(1); }

        @media (max-width: 1200px) { .knight { display: none; } }
        @keyframes knight-flicker { 0%,100% { opacity: 0.93; } 50% { opacity: 0.6; } }

        /* Top Bar */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.85); border-bottom: clamp(2px, 1vw, 4px) solid var(--neon-pri);
            box-shadow: 0 0 25px var(--neon-glow); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 10px; z-index: 10; pointer-events: auto;
            overflow-x: auto; gap: 10px;
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }
        .top-bar::-webkit-scrollbar { display: none; }
        button { touch-action: manipulation; }
        
        .top-btn {
            font-family: 'VT323', monospace; font-size: clamp(1rem, 4vw, 1.5rem); padding: 6px 10px;
            background: transparent; color: var(--neon-pri); border: 3px solid var(--neon-pri);
            cursor: pointer; box-shadow: var(--neon-shadow); transition: all 0.3s, border-color 0.8s ease, color 0.8s ease;
            text-shadow: 0 0 10px var(--neon-glow); flex-shrink: 0; white-space: nowrap;
        }
        .top-btn:hover, .top-btn:active { background: var(--neon-pri); color: #000; box-shadow: var(--neon-shadow-intense); }

        .lang-container { display: flex; gap: 4px; flex-wrap: nowrap; justify-content: center; }
        .lang-btn {
            font-size: clamp(1rem, 3.5vw, 1.4rem); background: transparent; border: 2px solid var(--neon-pri);
            padding: 4px 6px; border-radius: 4px; cursor: pointer;
            box-shadow: var(--neon-shadow); color: var(--neon-pri); text-shadow: 0 0 10px var(--neon-glow);
            text-align: center; font-family: 'VT323', monospace; transition: transform 0.2s, all 0.8s ease; flex-shrink: 0;
        }
        .lang-btn.active { background: var(--neon-pri); color: #000; box-shadow: var(--neon-shadow-intense); transform: scale(1.1); }

        .screen {
            position: fixed; top: 60px; left: 0; width: 100%; height: calc(100dvh - 60px);
            z-index: 3; display: none; overflow-y: auto; overflow-x: hidden; 
        }
        .screen.active { display: block; pointer-events: auto; }
        
        .screen-inner {
            min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: clamp(10px, 3dvh, 20px) 10px; margin: 0 auto; width: 100%; max-width: 820px; gap: clamp(10px, 2dvh, 15px);
        }

        .crt-container {
            width: 100%; background: var(--neon-bg); border: clamp(3px, 1.5vw, 8px) solid var(--neon-pri); border-radius: 8px;
            box-shadow: var(--neon-shadow-intense), inset 0 0 50px var(--neon-bg-light);
            padding: clamp(15px, 5dvh, 40px) 15px; position: relative; overflow: hidden; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s ease;
        }
        .crt-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 4px, rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 6px);
            animation: scanline 4s linear infinite; z-index: 3; pointer-events: none;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        #title-wrapper {
            position: relative; display: flex; justify-content: center; align-items: center;
            width: 100%; min-height: clamp(2.5rem, 8dvh, 7rem); margin-bottom: clamp(5px, 2dvh, 10px);
        }
        #title-text {
            margin: 0; line-height: 1.1; word-wrap: break-word; font-size: clamp(1.8rem, min(8vw, 12dvh), 5rem); 
            letter-spacing: 3px; text-shadow: var(--neon-shadow-intense); animation: specter-flicker 2.5s infinite alternate; 
            transition: text-shadow 0.8s ease, color 0.8s ease;
        }
        #title-horse-container { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
        .real-horse {
            position: absolute; top: 50%; left: 0; margin-top: -0.6em; font-size: clamp(2.5rem, min(8vw, 12dvh), 5rem); 
            filter: drop-shadow(0 0 20px var(--neon-glow)) sepia(1) hue-rotate(calc(var(--ui-hue)*1deg)) saturate(5) brightness(1.3);
            transform: scaleX(-1); animation: gallopBounce 0.35s infinite ease-in-out; will-change: transform;
        }
        @keyframes gallopBounce { 0%, 100% { transform: scaleX(-1) translateY(0); } 50% { transform: scaleX(-1) translateY(-15px); } }
        @keyframes specter-flicker { 0%,100% { opacity: 1; filter: blur(0px); } 50% { opacity: 0.85; filter: blur(1px); } 75% { opacity: 0.95; filter: blur(0px); } }

        .smoke-arcade { 
            letter-spacing: 5px; opacity: 0.9; animation: specter-flicker 3s infinite alternate; 
            font-size: clamp(1rem, min(4.5vw, 5dvh), 2.2rem); margin-bottom: 5px; 
        }
        
        .signature {
            font-size: clamp(0.8rem, 3.5vw, 1.3rem); color: var(--neon-sec); opacity: 0.7;
            letter-spacing: 2px; margin-bottom: clamp(15px, 4dvh, 25px); transition: color 0.8s ease;
        }

        #best-score-display { font-size: clamp(1rem, min(4.5vw, 5.5dvh), 1.8rem); color: var(--neon-sec); text-shadow: 0 0 15px var(--neon-sec); margin-bottom: 15px; font-weight: bold; transition: color 0.8s ease, text-shadow 0.8s ease; }

        .start-btn { 
            background: transparent; color: var(--neon-pri); cursor: pointer; font-family: 'VT323', monospace; 
            border: clamp(3px, 1vw, 6px) solid var(--neon-pri); box-shadow: var(--neon-shadow-intense); width: 80%; max-width: 300px;
            padding: clamp(8px, 2.5dvh, 15px) 25px; font-size: clamp(1.2rem, min(6vw, 7dvh), 2.5rem); 
            transition: all 0.3s, border-color 0.8s ease, color 0.8s ease, box-shadow 0.8s ease;
        }
        .start-btn:hover:not(.disabled), .start-btn:active:not(.disabled) { background: var(--neon-pri); color: #000; transform: scale(1.05); }
        .start-btn.disabled { opacity: 0.3; filter: grayscale(100%); }
        .info { opacity: 0.85; line-height: 1.3; margin-top: clamp(15px, 4dvh, 25px); font-size: clamp(0.8rem, min(3.5vw, 4dvh), 1.3rem); }

        .games-archive {
            margin-top: clamp(15px, 4dvh, 25px); padding-top: clamp(10px, 2dvh, 15px);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            width: 90%; border-top: 2px dashed var(--neon-bg-light); z-index: 5;
            transition: border-color 0.8s ease;
        }
        .archive-title { font-size: clamp(0.8rem, 3.5vw, 1.1rem); color: var(--neon-sec); opacity: 0.9; letter-spacing: 3px; transition: color 0.8s ease; }
        .archive-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .archive-links a {
            color: var(--neon-pri); text-decoration: none; font-size: clamp(0.9rem, 3.5vw, 1.3rem);
            transition: all 0.3s, color 0.8s ease; opacity: 0.8; padding: 2px 5px; border: 1px solid transparent;
        }
        .archive-links a:hover, .archive-links a:active { 
            opacity: 1; text-shadow: var(--neon-shadow); 
            transform: scale(1.05); border: 1px solid var(--neon-pri); background: var(--neon-bg-light);
        }

        /* Gioco 2D */
        .game-header { width: 100%; text-align: center; font-size: clamp(1.2rem, 5vmin, 2.2rem); text-shadow: var(--neon-shadow); transition: text-shadow 0.8s ease; }
        .board-container { 
            width: 100%; max-width: min(96vw, calc(100dvh - 180px), 600px); max-height: min(96vw, calc(100dvh - 180px), 600px); aspect-ratio: 1/1; flex-shrink: 0;
            background: rgba(0,0,0,0.7); border: clamp(3px, 1.5vw, 8px) solid var(--neon-pri); box-shadow: var(--neon-shadow-intense), inset 0 0 50px var(--neon-bg-light); padding: clamp(4px, 1.5vw, 8px); 
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }
        .board { 
            display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); border: 3px solid var(--neon-pri); box-shadow: inset 0 0 35px var(--neon-glow); 
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }
        .cell { 
            border: clamp(1px, 0.3vw, 2px) solid var(--neon-bg-light); display: flex; align-items: center; justify-content: center; 
            font-size: clamp(0.8rem, 3.5vmin, 2rem); color: var(--neon-pri); text-shadow: 0 0 15px var(--neon-glow); cursor: pointer; transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        @media (hover: hover) and (pointer: fine) { .cell:hover { background: var(--neon-bg-light); } }
        .cell:active { background: rgba(255,255,255,0.25); }
        
        .cell.visited { 
            border-color: var(--cell-color, var(--neon-pri));
            background: var(--cell-bg, var(--neon-bg-light));
            color: var(--num-color, var(--neon-sec));
            text-shadow: 0 0 15px var(--num-color, var(--neon-sec));
            box-shadow: inset 0 0 20px var(--cell-bg, var(--neon-bg-light));
        }
        .cell.possible { box-shadow: inset 0 0 20px rgba(255,255,255,0.6); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); }
        .cell.best-move { box-shadow: inset 0 0 30px rgba(255,255,255,0.9); background: rgba(255,255,255,0.35); color: #fff; text-shadow: 0 0 20px #fff; }

        .game-footer { display: flex; gap: 8px; font-size: 1.2rem; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; }
        .game-btn { font-family: 'VT323', monospace; background: transparent; color: var(--neon-pri); border: 3px solid var(--neon-pri); padding: 6px 12px; font-size: clamp(0.9rem, 3.5vmin, 1.3rem); cursor: pointer; box-shadow: var(--neon-shadow); flex-grow: 1; text-align: center; max-width: 150px; transition: all 0.3s, border-color 0.8s ease, color 0.8s ease;}
        .game-btn:hover, .game-btn:active { background: var(--neon-pri); color: #000; }
        #status { font-size: clamp(1rem, 4vmin, 1.5rem); color: var(--neon-sec); width: 100%; text-align: center; text-shadow: 0 0 15px var(--neon-sec); min-height: 25px; margin-top: 5px; transition: color 0.8s ease, text-shadow 0.8s ease;}

        @media (max-height: 550px) { .top-bar { height: 45px; } .screen { top: 45px; height: calc(100dvh - 45px); } .top-btn, .lang-btn { font-size: clamp(0.9rem, 3vw, 1.2rem); padding: 4px 8px; } }
        @media (orientation: landscape) and (max-height: 550px) {
            .screen-inner.game-layout { flex-direction: row; justify-content: space-between; align-items: center; gap: 10px; max-width: 1000px; margin: 0 auto; padding: 5px; }
            .board-container { max-width: calc(100dvh - 20px); max-height: calc(100dvh - 20px); width: calc(100dvh - 20px); margin: 0; padding: 4px; border-width: 3px; }
            .game-header { width: 25%; text-align: right; display: flex; flex-direction: column; justify-content: center; font-size: clamp(1rem, 5dvh, 2rem); }
            .game-footer { width: 25%; flex-direction: column; justify-content: center; gap: clamp(5px, 2dvh, 12px); }
            .game-btn { max-width: 100%; width: 100%; padding: clamp(4px, 1dvh, 8px); font-size: clamp(0.8rem, 4dvh, 1.2rem); }
            #status { font-size: clamp(0.9rem, 4dvh, 1.3rem); margin-top: 2px;}
        }

        /* --- 3D Cinematic Arena --- */
        #fly-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none;
            perspective: 2000px; -webkit-perspective: 2000px; overflow: hidden; will-change: opacity;
        }
        .scene-3d {
            width: 1000px; height: 1000px; position: absolute; top: 50%; left: 50%;
            transform-style: preserve-3d; -webkit-transform-style: preserve-3d; transform-origin: center center; will-change: transform;
        }
        
        .board-3d {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; 
            grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
            background: rgba(0,0,0,0.9); border: 10px solid var(--neon-pri); box-shadow: 0 0 100px var(--neon-glow), inset 0 0 180px var(--neon-bg-light);
            transform-style: preserve-3d; transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }
        .cell-3d {
            border: 2px solid var(--neon-bg-light); display: flex; align-items: center; justify-content: center; position: relative;
            transform-style: preserve-3d; transition: border-color 0.8s ease;
        }
        .cell-3d.visited { 
            background: var(--cell-bg, var(--neon-bg-light)); 
            box-shadow: inset 0 0 50px var(--cell-color, rgba(255,255,255,0.5)); 
            border-color: var(--cell-color, var(--neon-pri));
        }
        .trail-svg { position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; transform: translateZ(5px); overflow: visible; filter: drop-shadow(0 0 25px currentColor); color: var(--neon-pri); transition: color 0.8s ease;}
        #horse-mover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; will-change: transform; }
        #horse-bouncer { transform-style: preserve-3d; position: relative; } 
        
        #hologram-pivot { position: absolute; top: -50px; left: -50px; width: 100px; height: 100px; transform-style: preserve-3d; will-change: transform; }
        #flying-knight {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; font-size: 85px; text-align: center; line-height: 100px;
            color: var(--neon-pri); text-shadow: 0 0 60px var(--neon-glow); filter: drop-shadow(0 30px 20px rgba(0,0,0,0.9)); will-change: transform, opacity; transition: color 0.8s ease, text-shadow 0.8s ease;
        }

        #prism-wrapper { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; transform-style: preserve-3d; opacity: 0; pointer-events: none; will-change: transform, opacity; }
        #prism-spinner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; animation: spin-prism 4s linear infinite; }
        @keyframes spin-prism { 0% { transform: rotateX(15deg) rotateY(0deg); } 100% { transform: rotateX(15deg) rotateY(360deg); } }

        .prism-face {
            position: absolute; top: 0; left: 0; width: 50px; height: 50px; 
            border: 2px solid var(--cube-color, var(--neon-pri));
            box-shadow: inset 0 0 15px var(--cube-color, var(--neon-bg-light)), 0 0 15px var(--cube-color, var(--neon-glow)); 
            background: var(--cube-bg, rgba(0, 0, 0, 0.7)); backface-visibility: visible;
        }
        .prism-face.front  { transform: rotateY(0deg) translateZ(25px); } .prism-face.back   { transform: rotateY(180deg) translateZ(25px); }
        .prism-face.left   { transform: rotateY(-90deg) translateZ(25px); } .prism-face.right  { transform: rotateY(90deg) translateZ(25px); }
        .prism-face.top    { transform: rotateX(90deg) translateZ(25px); } .prism-face.bottom { transform: rotateX(-90deg) translateZ(25px); }

        #projected-number {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; 
            font-size: 40px; font-weight: bold; 
            color: var(--num-color, #fff); text-shadow: 0 0 25px var(--num-glow, var(--neon-glow)), 0 0 50px var(--num-color, #fff);
            transform: translateZ(0); font-family: 'VT323', monospace;
        }
        #projected-number span { opacity: 0; color: inherit; } 
        #projected-number.lasering { animation: laser-flicker 0.15s infinite; }
        @keyframes laser-flicker { 0%, 100% { opacity: 1; filter: brightness(1.3); } 50% { opacity: 0.8; filter: brightness(0.8); } }

        .static-prism {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            transform: translate(-50%, -50%) translateZ(25px); 
            transform-style: preserve-3d;
        }
        .static-prism-face {
            position: absolute; top: 0; left: 0; width: 50px; height: 50px; 
            border: 1px solid var(--cube-color, var(--neon-bg-light));
            background: var(--cube-bg, rgba(0, 0, 0, 0.7)); backface-visibility: visible; 
            box-shadow: inset 0 0 15px var(--cube-color, rgba(255,255,255,0.25));
        }
        .static-prism-face.front  { transform: rotateY(0deg) translateZ(25px); } .static-prism-face.back   { transform: rotateY(180deg) translateZ(25px); }
        .static-prism-face.left   { transform: rotateY(-90deg) translateZ(25px); } .static-prism-face.right  { transform: rotateY(90deg) translateZ(25px); }
        .static-prism-face.top    { transform: rotateX(90deg) translateZ(25px); } .static-prism-face.bottom { transform: rotateX(-90deg) translateZ(25px); }
        
        .static-prism-number {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; 
            font-size: 35px; font-weight: bold; 
            color: var(--num-color, rgba(255,255,255,0.95)); text-shadow: 0 0 15px var(--num-glow, var(--neon-glow));
            font-family: 'VT323', monospace;
        }

        .is-undo #flying-knight { color: #ff0041; text-shadow: 0 0 60px #ff0041; }
        .is-undo .prism-face { border-color: #ff0041 !important; box-shadow: inset 0 0 15px rgba(255,0,65,0.4), 0 0 15px rgba(255,0,65,0.5) !important; background: rgba(20, 0, 0, 0.7) !important; }
        .is-undo #projected-number { text-shadow: 0 0 25px #ff0041, 0 0 50px #fff !important; }
    </style>
</head>
<body>

    <div id="init-overlay">
        <svg class="init-icon" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke-width="4" stroke-dasharray="280" stroke-dashoffset="0"></circle>
            <polygon points="42,32 42,68 70,50" stroke-width="2" stroke-linejoin="round"></polygon>
        </svg>
    </div>

    <canvas id="matrix"></canvas>

    <div class="knight knight-left">♞</div>
    <div class="knight knight-right">♞</div>

    <div class="top-bar">
        <button class="top-btn" id="fullscreen-btn" onclick="toggleFullscreen()">⛶ FULL</button>
        <div class="lang-container" id="lang-container"></div>
        <button class="top-btn" id="audio-btn" onclick="toggleAudio()">🔊 AUDIO</button>
    </div>

    <div id="home-screen" class="screen active">
        <div class="screen-inner">
            <div class="crt-container">
                <div id="title-wrapper"><div id="title-horse-container"><div class="real-horse" id="real-horse-emoji">🐎</div></div><h1 id="title-text">KNIGHT'S TOUR</h1></div>
                
                <div class="smoke-arcade" id="smoke">Neon Specter Sys.</div>
                <div class="signature">by TheOldSmokeArcade1984</div>

                <div id="best-score-display">BEST TOUR: 0</div>
                <button class="start-btn disabled" id="start-btn" onclick="startGame()">START</button>
                <div class="info" id="info">100 moves • Chess Knight<br>Fill every square exactly once</div>
                
                <div class="games-archive">
                    <div class="archive-title">>> SYS.ARCHIVE <<</div>
                    <div class="archive-links">
                        <a href="https://theoldsmokearcade1984.itch.io/neonspecter" target="_blank" rel="noopener">[ NEONSPECTER ]</a>

    <script>
        // --- GESTIONE COLORI NEON DINAMICI - NEON SPECTER LEGACY ---
        let globalHue = 180; // Inizia con il "Ciano Spettrale"
        let idleAnimReq;
        let isGameActive = false;

        function updateRootHue(h) {
            document.documentElement.style.setProperty('--ui-hue', h);
        }

        function cycleIdleNeon() {
            if (!isGameActive) {
                globalHue = (globalHue + 0.25) % 360; 
                updateRootHue(globalHue);
                idleAnimReq = requestAnimationFrame(cycleIdleNeon);
            }
        }
        cycleIdleNeon(); 

        let audioContext = null; let audioEnabled = true;
        function initAudio() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); if (audioContext.state === 'suspended') audioContext.resume(); }
        function playRetroBeep(freq, duration, volume = 0.15, type = 'square') {
            if (!audioEnabled || !audioContext) return;
            try { const o = audioContext.createOscillator(); const g = audioContext.createGain(); o.connect(g); g.connect(audioContext.destination);
                o.frequency.setValueAtTime(freq, audioContext.currentTime); o.type = type; g.gain.setValueAtTime(volume, audioContext.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration/1000); o.start(); o.stop(audioContext.currentTime + duration/1000 + 0.05);
            } catch (e) {}
        }
        function toggleAudio() { audioEnabled = !audioEnabled; updateUITexts(); if(audioEnabled) playRetroBeep(600, 50, 0.1, 'square'); }
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) { const docElm = document.documentElement; if (docElm.requestFullscreen) docElm.requestFullscreen(); else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
            } else { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); }
        }
        document.addEventListener('fullscreenchange', updateUITexts); document.addEventListener('webkitfullscreenchange', updateUITexts);
        document.getElementById('init-overlay').addEventListener('click', function() { initAudio(); toggleFullscreen(); playRetroBeep(880, 150, 0.2, 'square'); this.style.display = 'none'; });

        // --- VARIABILI GLOBALI PRINCIPALI ---
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d'); 
        
        // Sostituzione dei caratteri Matrix con icone degli scacchi Unicode
        const chars = "♔♕♖♗♘♙♚♛♜♝♞♟";
        const fontSize = 18; 
        let columns = 0, drops = []; 
        
        // MODIFICA VELOCITÀ MATRIX
        let rainSpeed = 0.15; 
        
        let matrixErrorActive = false; 
        
        let board = Array(10).fill().map(() => Array(10).fill(0)); 
        let moveNumber = 0; 
        let knightPos = { row: -1, col: -1 }; 
        let tourHistory = []; 
        let bestScore = localStorage.getItem('knightTourSpecterBest') || 0; 
        let hasSavedGame = false;
        const deltas = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];

        let currentCameraZRot = 45;
        let currentLang = null;
        const translations = { 
            it: { startBtn: "INIZIA", resumeBtn: "CONTINUA", bestTour: "MIGLIOR TOUR", info: "100 mosse • Cavallo degli scacchi<br>Riempi la griglia", gameTitle: "KNIGHT'S TOUR", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "MOSSA", undo: "↩ UNDO", newTour: "NUOVO", home: "← HOME", statusPlaced: "✓ POSIZIONATO", statusComplete: "🎉 COMPLETATO!", statusUndo: "ANNULLATA", statusNew: "NUOVO TOUR" },
            en: { startBtn: "START", resumeBtn: "RESUME", bestTour: "BEST TOUR", info: "100 moves • Chess Knight<br>Fill every square", gameTitle: "KNIGHT'S TOUR", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "MOVE", undo: "↩ UNDO", newTour: "NEW", home: "← HOME", statusPlaced: "✓ PLACED", statusComplete: "🎉 COMPLETED!", statusUndo: "UNDONE", statusNew: "NEW TOUR" },
            ja: { startBtn: "開始", resumeBtn: "再開する", bestTour: "ベスト", info: "100手 • 騎士の動き<br>すべてのマスを埋める", gameTitle: "騎士の巡回", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "移動", undo: "↩ 戻る", newTour: "新規", home: "← ホーム", statusPlaced: "✓ 配置", statusComplete: "🎉 完了!", statusUndo: "戻しました", statusNew: "新規開始" },
            zh: { startBtn: "开始", resumeBtn: "继续", bestTour: "最佳", info: "100步 • 骑士移动<br>填满所有格子", gameTitle: "骑士巡游", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "步数", undo: "↩ 撤销", newTour: "新局", home: "← 主页", statusPlaced: "✓ 已放置", statusComplete: "🎉 完成!", statusUndo: "已撤销", statusNew: "新局开始" },
            fr: { startBtn: "JOUER", resumeBtn: "REPRENDRE", bestTour: "MEILLEUR", info: "100 coups • Cavalier<br>Remplir la grille", gameTitle: "TOUR DU CAVALIER", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "COUP", undo: "↩ ANNULER", newTour: "NOUVEAU", home: "← ACCUEIL", statusPlaced: "✓ PLACÉ", statusComplete: "🎉 TERMINÉ!", statusUndo: "ANNULÉ", statusNew: "NOUVEAU TOUR" },
            de: { startBtn: "START", resumeBtn: "WEITER", bestTour: "BESTER", info: "100 Züge • Springer<br>Fülle das Gitter", gameTitle: "SPRINGER-TOUR", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "ZUG", undo: "↩ ZURÜCK", newTour: "NEU", home: "← START", statusPlaced: "✓ PLATZIERT", statusComplete: "🎉 GESCHAFFT!", statusUndo: "RÜCKGÄNGIG", statusNew: "NEUE TOUR" },
            es: { startBtn: "INICIAR", resumeBtn: "REANUDAR", bestTour: "MEJOR TOUR", info: "100 mov. • Caballo<br>Llena la cuadrícula", gameTitle: "TOUR DEL CABALLO", audioOn: "🔊 ON", audioOff: "🔇 OFF", fullScreen: "⛶ FULL", exitFull: "⛶ EXIT", moveText: "PASO", undo: "↩ DESHACER", newTour: "NUEVO", home: "← INICIO", statusPlaced: "✓ COLOCADO", statusComplete: "🎉 COMPLETADO!", statusUndo: "DESHECHO", statusNew: "NUEVO TOUR" }
        };
        const langCodes = { it: "IT", en: "EN", ja: "JP", zh: "ZH", fr: "FR", de: "DE", es: "ES" };
        const warningTexts = ["SCEGLI LA LINGUA", "CHOOSE LANGUAGE", "言語を選択", "选择语言"];
        let titleAnimActive = false; let titleAnimRef, hoofInterval, revealInterval, errAnimRef, errHI, errLI;

        function resizeCanvas() { 
            const dpr = window.devicePixelRatio || 1; canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr);
            const newColumns = Math.floor(window.innerWidth / fontSize);
            if (columns === 0) { for (let i = 0; i < newColumns; i++) drops[i] = Math.random() * (window.innerHeight / fontSize); } else if (newColumns > columns) { for (let i = columns; i < newColumns; i++) drops[i] = Math.random() * (window.innerHeight / fontSize); }
            columns = newColumns;
        }
        window.addEventListener('resize', resizeCanvas); window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.04)'; 
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight); 
            ctx.font = `${fontSize}px monospace`;
            
            for (let i = 0; i < columns; i++) {
                if (drops[i] === undefined) drops[i] = 0; const text = chars[Math.floor(Math.random() * chars.length)]; 
                
                let charHue = globalHue;
                
                if (isGameActive && tourHistory && tourHistory.length > 0) {
                    const historyChance = 0.5 + (tourHistory.length / 200); 
                    if (Math.random() < historyChance) {
                        const randomStep = tourHistory[Math.floor(Math.random() * tourHistory.length)];
                        charHue = randomStep.hue;
                    }
                } else if (!isGameActive && tourHistory && tourHistory.length > 0) {
                     if (Math.random() < 0.3) {
                        const randomStep = tourHistory[Math.floor(Math.random() * tourHistory.length)];
                        charHue = randomStep.hue;
                     }
                }

                // --- NOVITÀ: CONTORNO NERO AL CARATTERE MASTER ---
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.strokeText(text, i * fontSize, drops[i] * fontSize);
                // --------------------------------------------------

                ctx.fillStyle = matrixErrorActive && Math.random() > 0.8 ? '#ff0041' : `hsl(${charHue}, 100%, 65%)`; 
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > window.innerHeight && Math.random() > 0.975) drops[i] = 0; drops[i] += rainSpeed;
            }
        }
        function animate() { drawMatrix(); requestAnimationFrame(animate); }

        function clearAnimations() {
            if (titleAnimRef) titleAnimRef.cancel(); if (errAnimRef) errAnimRef.cancel();
            clearInterval(hoofInterval); clearInterval(revealInterval); clearInterval(errHI); clearInterval(errLI); titleAnimActive = false; matrixErrorActive = false;
        }

        function animateTitleReveal(newTitle) {
            clearAnimations(); titleAnimActive = true; const horseContainer = document.getElementById('title-horse-container'), titleText = document.getElementById('title-text');
            titleText.textContent = ''; document.documentElement.style.setProperty('--ui-hue', globalHue); horseContainer.style.display = 'block';
            const duration = 2400; titleAnimRef = horseContainer.animate([{ transform: 'translateX(-20%)' }, { transform: 'translateX(120%)' }], { duration: duration, easing: 'linear' });
            hoofInterval = setInterval(() => { playRetroBeep(350, 40, 0.15, 'triangle'); setTimeout(() => playRetroBeep(280, 40, 0.15, 'triangle'), 80); }, 260); 
            let i = 0; revealInterval = setInterval(() => { if (i < newTitle.length) { titleText.textContent += newTitle[i]; i++; } }, (duration * 0.75) / Math.max(newTitle.length, 1));
            titleAnimRef.onfinish = () => { clearInterval(hoofInterval); clearInterval(revealInterval); titleText.textContent = newTitle; horseContainer.style.display = 'none'; titleAnimActive = false; };
        }

        function triggerErrorAnimation() {
            clearAnimations(); titleAnimActive = true; matrixErrorActive = true; 
            const hc = document.getElementById('title-horse-container'), tt = document.getElementById('title-text'), he = document.getElementById('real-horse-emoji'); 
            const orig = currentLang ? translations[currentLang].gameTitle : "KNIGHT'S TOUR";
            tt.style.color = '#ff0041'; tt.style.textShadow = '0 0 25px #ff0041'; he.style.filter = 'drop-shadow(0 0 20px #ff0041) sepia(1) hue-rotate(-50deg) saturate(5) brightness(1.5)'; hc.style.display = 'block';
            errAnimRef = hc.animate([{ transform: 'translateX(-20%)' }, { transform: 'translateX(120%)' }], { duration: 3000, easing: 'linear' }); errHI = setInterval(() => { playRetroBeep(200, 40, 0.2, 'sawtooth'); }, 300);
            let i = 0; tt.textContent = warningTexts[0]; errLI = setInterval(() => { i++; if (i < warningTexts.length) tt.textContent = warningTexts[i]; }, 3000 / warningTexts.length);
            errAnimRef.onfinish = () => { clearInterval(errHI); clearInterval(errLI); hc.style.display = 'none'; tt.style.color = 'var(--neon-pri)'; tt.style.textShadow = 'var(--neon-shadow-intense)'; he.style.filter = 'drop-shadow(0 0 20px var(--neon-glow)) sepia(1) hue-rotate(calc(var(--ui-hue)*1deg)) saturate(5) brightness(1.3)'; tt.textContent = orig; matrixErrorActive = false; titleAnimActive = false; };
        }

        function checkSavedGame() {
            const savedData = localStorage.getItem('knightTourSpecterSave');
            if (savedData) { 
                try { 
                    const parsed = JSON.parse(savedData); 
                    const hist = parsed.tourHistory || parsed.history; 
                    if (hist && hist.length > 0 && parsed.moveNumber < 100) { hasSavedGame = true; return; } 
                } catch(e) {} 
            } 
            hasSavedGame = false;
        }

        function updateUITexts() {
            if(!currentLang) return; const t = translations[currentLang]; document.getElementById('audio-btn').textContent = audioEnabled ? t.audioOn : t.audioOff;
            const isFull = document.fullscreenElement || document.webkitFullscreenElement; document.getElementById('fullscreen-btn').textContent = isFull ? t.exitFull : t.fullScreen;
            document.getElementById('start-btn').textContent = hasSavedGame ? t.resumeBtn : t.startBtn; document.getElementById('info').innerHTML = t.info; document.getElementById('start-btn').classList.remove('disabled');
            document.getElementById('txt-move').textContent = t.moveText; document.getElementById('btn-undo').textContent = t.undo; document.getElementById('btn-new').textContent = t.newTour; document.getElementById('btn-home').textContent = t.home; document.getElementById('lang-game-title').textContent = t.gameTitle; document.getElementById('best-score-display').textContent = `${t.bestTour}: ${bestScore}`;
        }

        function createLanguageButtons() {
            const container = document.getElementById('lang-container'); container.innerHTML = ''; checkSavedGame();
            Object.keys(langCodes).forEach(lang => {
                const btn = document.createElement('button'); btn.className = `lang-btn ${lang === currentLang ? 'active' : ''}`; btn.textContent = langCodes[lang];
                btn.onclick = () => { initAudio(); const isNewLang = currentLang !== lang; currentLang = lang; if (isNewLang) animateTitleReveal(translations[currentLang].gameTitle); playRetroBeep(680, 40, 0.16, 'square'); setTimeout(() => playRetroBeep(920, 60, 0.14, 'square'), 30); updateUITexts(); createLanguageButtons(); }; container.appendChild(btn);
            }); if (currentLang) updateUITexts();
        }

        function saveGame() {
            const state = { board, tourHistory, moveNumber, knightPos, globalHue }; 
            localStorage.setItem('knightTourSpecterSave', JSON.stringify(state));
            if (moveNumber > bestScore) { bestScore = moveNumber; localStorage.setItem('knightTourSpecterBest', bestScore); if (currentLang) document.getElementById('best-score-display').textContent = `${translations[currentLang].bestTour}: ${bestScore}`; }
        }

        function loadSavedGame() {
            const savedData = localStorage.getItem('knightTourSpecterSave');
            if (savedData) { 
                const state = JSON.parse(savedData); board = state.board; 
                tourHistory = state.tourHistory || state.history || [];
                tourHistory = tourHistory.map(h => h.hue !== undefined ? h : {...h, hue: 180});
                moveNumber = state.moveNumber; knightPos = state.knightPos; 
                globalHue = state.globalHue || (tourHistory.length > 0 ? tourHistory[tourHistory.length-1].hue : 180); 
                updateRootHue(globalHue);
                
                createBoards(); renderBoard(); 
                document.getElementById('current-move').textContent = String(moveNumber).padStart(2, '0'); document.getElementById('status').textContent = ''; return true; 
            } return false;
        }

        const boardEl = document.getElementById('board'); const board3dEl = document.getElementById('board-3d');
        function createBoards() {
            boardEl.innerHTML = ''; board3dEl.innerHTML = '';
            for (let r = 0; r < 10; r++) { for (let c = 0; c < 10; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell'; cell.onclick = () => handleCellClick(r, c); boardEl.appendChild(cell);
                    const cell3d = document.createElement('div'); cell3d.className = 'cell-3d'; cell3d.dataset.r = r; cell3d.dataset.c = c; board3dEl.appendChild(cell3d);
            }}
        }

        function renderBoard() {
            const cells = boardEl.children;
            for (let i = 0; i < 100; i++) { 
                cells[i].textContent = ''; cells[i].className = 'cell'; cells[i].removeAttribute('style');
            }
            for (let i = 0; i < tourHistory.length; i++) {
                const step = tourHistory[i]; const idx = step.row * 10 + step.col; const cell = cells[idx];
                cell.textContent = i + 1; cell.classList.add('visited');
                const cellH = step.hue; const numH = (step.hue + 240) % 360;
                cell.style.setProperty('--cell-color', `hsl(${cellH}, 100%, 55%)`);
                cell.style.setProperty('--cell-bg', `hsla(${cellH}, 100%, 50%, 0.25)`);
                cell.style.setProperty('--num-color', `hsl(${numH}, 100%, 70%)`);
            }
            if (knightPos.row !== -1) highlightPossibleMoves();
        }

        function getValidMoves(r, c) { let moves = []; deltas.forEach(([dr, dc]) => { let nr = r + dr, nc = c + dc; if (nr >= 0 && nr < 10 && nc >= 0 && nc < 10 && board[nr][nc] === 0) moves.push({r: nr, c: nc}); }); return moves; }
        function highlightPossibleMoves() {
            const cells = boardEl.children; let possibleMoves = getValidMoves(knightPos.row, knightPos.col); let minOnward = 99;
            possibleMoves.forEach(m => { m.onward = getValidMoves(m.r, m.c).length; if (m.onward < minOnward) minOnward = m.onward; });
            possibleMoves.forEach(m => { let idx = m.r * 10 + m.c; cells[idx].classList.add('possible'); if (m.onward === minOnward && minOnward < 99) cells[idx].classList.add('best-move'); });
        }

        function handleCellClick(row, col) {
            initAudio(); const t = translations[currentLang];
            const targetHue = moveNumber === 0 ? 180 : (globalHue + 137.5) % 360;
            
            if (moveNumber === 0) { 
                knightPos = { row, col }; moveNumber = 1; board[row][col] = 1; tourHistory = [{row, col, hue: targetHue}]; 
                globalHue = targetHue; updateRootHue(globalHue);
                renderBoard(); document.getElementById('current-move').textContent = '01'; document.getElementById('status').textContent = t.statusPlaced; 
                playRetroBeep(880, 120, 0.2, 'square'); saveGame(); return; 
            }
            const dr = row - knightPos.row; const dc = col - knightPos.col; if (!deltas.some(([ddr, ddc]) => ddr === dr && ddc === dc) || board[row][col] !== 0) return;
            const prev = tourHistory[tourHistory.length - 1];
            
            showDynamicKnight3D(prev.row, prev.col, row, col, false, targetHue, () => {
                moveNumber++; board[row][col] = moveNumber; tourHistory.push({row, col, hue: targetHue}); knightPos = { row, col }; 
                globalHue = targetHue; updateRootHue(globalHue); 
                
                renderBoard(); document.getElementById('current-move').textContent = String(moveNumber).padStart(2, '0');
                if (moveNumber === 100) { document.getElementById('status').textContent = t.statusComplete; playRetroBeep(1380, 400, 0.25, 'sine'); localStorage.removeItem('knightTourSpecterSave'); hasSavedGame = false; } else { document.getElementById('status').textContent = ''; saveGame(); }
            });
        }

        function undoMove() {
            if (moveNumber <= 1) return; const t = translations[currentLang]; const current = tourHistory[tourHistory.length - 1]; const prev = tourHistory[tourHistory.length - 2];
            showDynamicKnight3D(prev.row, prev.col, current.row, current.col, true, null, () => {
                const last = tourHistory.pop(); board[last.row][last.col] = 0; knightPos = tourHistory[tourHistory.length - 1]; moveNumber--; 
                globalHue = knightPos.hue; updateRootHue(globalHue);
                renderBoard(); document.getElementById('current-move').textContent = String(moveNumber).padStart(2, '0'); document.getElementById('status').textContent = t.statusUndo; saveGame();
            });
        }

        function getOcclusionScore(rt, ct, angle) {
            let score = 0;
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    if (board[i][j] > 0 && !(i === rt && j === ct)) {
                        if (angle === 45 && i >= rt && j >= ct) score++;
                        else if (angle === 135 && i <= rt && j >= ct) score++;
                        else if (angle === -135 && i <= rt && j <= ct) score++;
                        else if (angle === -45 && i >= rt && j <= ct) score++;
                    }
                }
            }
            return score;
        }

        function showDynamicKnight3D(r1, c1, r2, c2, isUndo, targetHue, callback) {
            const flyScreen = document.getElementById('fly-screen'), scene3D = document.getElementById('scene-3d'),
                  horseMover = document.getElementById('horse-mover'), trailPath = document.getElementById('trail-path'),
                  holoPivot = document.getElementById('hologram-pivot'), knightText = document.getElementById('flying-knight'), 
                  prismWrapper = document.getElementById('prism-wrapper'), projNum = document.getElementById('projected-number'),
                  cells3D = document.querySelectorAll('.cell-3d');

            if (getOcclusionScore(r2, c2, currentCameraZRot) > 0) {
                const angles = [45, 135, -135, -45];
                let minScore = Infinity; let bestAngle = currentCameraZRot;
                angles.sort((a, b) => { let da = Math.abs(a - currentCameraZRot); if (da > 180) da = 360 - da; let db = Math.abs(b - currentCameraZRot); if (db > 180) db = 360 - db; return da - db; });
                for (let a of angles) { let s = getOcclusionScore(r2, c2, a); if (s < minScore) { minScore = s; bestAngle = a; } if (minScore === 0) break; }
                let diff = (bestAngle - currentCameraZRot) % 360; if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
                currentCameraZRot += diff;
            }

            cells3D.forEach(cell => {
                const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c); 
                cell.innerHTML = ''; cell.className = 'cell-3d'; cell.removeAttribute('style');
                if (board[r][c] > 0) { 
                    cell.classList.add('visited'); 
                    const stepIndex = board[r][c] - 1; const stepHue = tourHistory[stepIndex].hue;
                    const cellH = stepHue; const cubeH = (stepHue + 120) % 360; const numH = (stepHue + 240) % 360;

                    cell.style.setProperty('--cell-color', `hsl(${cellH}, 100%, 55%)`);
                    cell.style.setProperty('--cell-bg', `hsla(${cellH}, 100%, 50%, 0.15)`);

                    if (!(r === r2 && c === c2)) {
                        cell.innerHTML = `
                            <div class="static-prism" style="
                                --cube-color: hsl(${cubeH}, 100%, 55%); --cube-bg: hsla(${cubeH}, 100%, 25%, 0.7);
                                --num-color: hsl(${numH}, 100%, 65%); --num-glow: hsl(${numH}, 100%, 50%);
                            ">
                                <div class="static-prism-face front"></div><div class="static-prism-face back"></div>
                                <div class="static-prism-face left"></div><div class="static-prism-face right"></div>
                                <div class="static-prism-face top"></div><div class="static-prism-face bottom"></div>
                                <div class="static-prism-number" style="transform: rotateZ(${-currentCameraZRot}deg) rotateX(-60deg)">${board[r][c]}</div>
                            </div>`;
                    }
                }
            });

            if (!isUndo && targetHue !== null) {
                const cubeH = (targetHue + 120) % 360; const numH = (targetHue + 240) % 360;
                prismWrapper.style.setProperty('--cube-color', `hsl(${cubeH}, 100%, 55%)`);
                prismWrapper.style.setProperty('--cube-bg', `hsla(${cubeH}, 100%, 25%, 0.7)`);
                prismWrapper.style.setProperty('--num-color', `#ffffff`); 
                prismWrapper.style.setProperty('--num-glow', `hsl(${numH}, 100%, 55%)`);
            }

            const w = window.innerWidth, h = window.innerHeight;
            const visualBoardSize = Math.min(w * 0.96, h - 180, 600);
            const baseScale = visualBoardSize / 1000; const zoomScale = baseScale * 2.1; 

            const S = 100; const startX = c1 * S + 50, startY = r1 * S + 50; const endX = c2 * S + 50, endY = r2 * S + 50;
            let cornerX = startX, cornerY = endY; if (Math.abs(r2 - r1) === 2) { cornerX = startX; cornerY = endY; } else { cornerX = endX; cornerY = startY; }
            const panStartX = 500 - startX, panStartY = 500 - startY; const panEndX = 500 - endX, panEndY = 500 - endY;

            trailPath.setAttribute('d', `M ${startX} ${startY} L ${cornerX} ${cornerY} L ${endX} ${endY}`);
            trailPath.style.strokeDasharray = trailPath.getTotalLength();

            const sceneFlatRot = 'rotateX(0deg) rotateZ(0deg)'; const sceneTiltRot = `rotateX(60deg) rotateZ(${currentCameraZRot}deg)`;
            const holoFlatRot = 'rotateZ(0deg) rotateX(0deg)'; const holoTiltRot = `rotateZ(${-currentCameraZRot}deg) rotateX(-60deg)`;
            
            const vx = isUndo ? (c1 - c2) : (c2 - c1);
            const vy = isUndo ? (r1 - r2) : (r2 - r1);
            const rad = currentCameraZRot * Math.PI / 180;
            const screen_vx = vx * Math.cos(rad) - vy * Math.sin(rad);
            const horseScaleDir = (screen_vx > 0) ? -1 : 1;
            
            knightText.style.transform = `scaleX(${horseScaleDir})`; 
            knightText.style.opacity = '1'; knightText.style.filter = `drop-shadow(0 30px 20px rgba(0,0,0,0.9)) drop-shadow(0 0 30px var(--neon-glow))`;
            prismWrapper.style.opacity = '0'; projNum.classList.remove('lasering');
            
            if(isUndo) holoPivot.classList.add('is-undo'); else holoPivot.classList.remove('is-undo');

            const targetStr = String(isUndo ? moveNumber : moveNumber + 1).padStart(2, '0');
            const span1 = projNum.querySelector('.c1'), span2 = projNum.querySelector('.c2');
            span1.textContent = targetStr[0]; span2.textContent = targetStr[1]; span1.style.opacity = '0'; span2.style.opacity = '0'; 

            flyScreen.style.opacity = '0'; flyScreen.style.display = 'block'; scene3D.classList.add('anim-active');
            flyScreen.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 150, fill: 'forwards' });

            let knightDematAnim, prismMatAnim, span1Anim, span2Anim, prismDematAnim;

            const sceneAnim = scene3D.animate([
                { transform: `translate(-50%, -50%) scale(${baseScale}) ${sceneFlatRot} translate3d(0px, 0px, 0px)`, offset: 0 },
                { transform: `translate(-50%, -50%) scale(${zoomScale}) ${sceneTiltRot} translate3d(${panStartX}px, ${panStartY}px, 0px)`, offset: 0.09 }, 
                { transform: `translate(-50%, -50%) scale(${zoomScale}) ${sceneTiltRot} translate3d(${panEndX}px, ${panEndY}px, 0px)`, offset: 0.32 }, 
                { transform: `translate(-50%, -50%) scale(${zoomScale}) ${sceneTiltRot} translate3d(${panEndX}px, ${panEndY}px, 0px)`, offset: 0.90 }, 
                { transform: `translate(-50%, -50%) scale(${baseScale}) ${sceneFlatRot} translate3d(0px, 0px, 0px)`, offset: 1 } 
            ], { duration: 6500, easing: 'ease-in-out', fill: 'forwards' });

            const holoAnim = holoPivot.animate([
                { transform: holoFlatRot, offset: 0 }, { transform: holoTiltRot, offset: 0.09 },
                { transform: holoTiltRot, offset: 0.90 }, { transform: holoFlatRot, offset: 1 }
            ], { duration: 6500, easing: 'ease-in-out', fill: 'forwards' });

            const flyZ = 70; 
            const horseAnim = horseMover.animate(isUndo ? [
                { transform: `translate3d(${endX}px, ${endY}px, ${flyZ}px)` }, { transform: `translate3d(${cornerX}px, ${cornerY}px, ${flyZ}px)`, offset: 0.34 }, { transform: `translate3d(${startX}px, ${startY}px, ${flyZ}px)` }
            ] : [
                { transform: `translate3d(${startX}px, ${startY}px, ${flyZ}px)` }, { transform: `translate3d(${cornerX}px, ${cornerY}px, ${flyZ}px)`, offset: 0.66 }, { transform: `translate3d(${endX}px, ${endY}px, ${flyZ}px)` }
            ], { duration: 1500, delay: 600, easing: 'linear', fill: 'both' });

            trailPath.animate(isUndo ? [{ strokeDashoffset: 0 }, { strokeDashoffset: trailPath.getTotalLength() }] : [{ strokeDashoffset: trailPath.getTotalLength() }, { strokeDashoffset: 0 }], { duration: 1500, delay: 600, easing: 'linear', fill: 'both' });

            const landTime = 2100;
            
            setTimeout(() => {
                if (flyScreen.style.display === 'none') return;
                knightDematAnim = knightText.animate([
                    { opacity: 1, filter: 'blur(0px)' }, 
                    { opacity: 0, filter: 'blur(5px)', transform: `scaleX(${horseScaleDir}) scale(1.1)` }
                ], { duration: 250, fill: 'forwards', easing: 'ease-out' });

                prismWrapper.style.opacity = '1';
                prismMatAnim = prismWrapper.animate([
                    { transform: 'scale3d(0, 0, 0)', opacity: 0 },
                    { transform: 'scale3d(1, 1, 1)', opacity: 1 }
                ], { duration: 400, fill: 'forwards', easing: 'ease-out' });

                playRetroBeep(isUndo ? 150 : 750, 300, 0.2, 'sawtooth'); 
            }, landTime);

            setTimeout(() => {
                if (flyScreen.style.display === 'none') return;
                projNum.classList.add('lasering'); playRetroBeep(isUndo ? 200 : 550, 1000, 0.15, 'square'); 
            }, landTime + 500);

            setTimeout(() => {
                if (flyScreen.style.display === 'none') return;
                span1Anim = span1.animate([{ opacity: 0 }, { opacity: 1, filter: 'brightness(3)' }, { opacity: 1 }], { duration: 300, easing: 'steps(4)', fill: 'forwards' });
            }, landTime + 600);

            setTimeout(() => {
                if (flyScreen.style.display === 'none') return;
                span2Anim = span2.animate([{ opacity: 0 }, { opacity: 1, filter: 'brightness(3)' }, { opacity: 1 }], { duration: 300, easing: 'steps(4)', fill: 'forwards' });
            }, landTime + 1000);

            setTimeout(() => {
                 if (flyScreen.style.display === 'none') return;
                 projNum.classList.remove('lasering'); if(!isUndo) playRetroBeep(1200, 200, 0.1, 'sine'); 
            }, landTime + 1500);

            setTimeout(() => {
                if (flyScreen.style.display === 'none') return;
                prismDematAnim = prismWrapper.animate([
                    { transform: 'scale3d(1, 1, 1)', opacity: 1 },
                    { transform: 'scale3d(0, 0, 0)', opacity: 0 }
                ], { duration: 300, fill: 'forwards', easing: 'ease-in' });
            }, 5800);

            const fadeAnim = flyScreen.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 250, delay: 6200, fill: 'forwards' });

            const pitchMult = isUndo ? 0.7 : 1;
            setTimeout(() => playRetroBeep(120 * pitchMult, 350, 0.12, 'sine'), 100);  
            setTimeout(() => playRetroBeep(300 * pitchMult, 50, 0.2, 'triangle'), 600); 
            setTimeout(() => playRetroBeep(250 * pitchMult, 50, 0.2, 'triangle'), 1100); 
            setTimeout(() => playRetroBeep(350 * pitchMult, 50, 0.2, 'triangle'), 1600); 
            setTimeout(() => playRetroBeep(100 * pitchMult, 350, 0.12, 'sine'), 5900); 

            fadeAnim.onfinish = () => { 
                flyScreen.style.display = 'none'; scene3D.classList.remove('anim-active'); 
                if(sceneAnim) sceneAnim.cancel(); if(holoAnim) holoAnim.cancel(); 
                if(horseAnim) horseAnim.cancel(); if(fadeAnim) fadeAnim.cancel();
                if(knightDematAnim) knightDematAnim.cancel(); if(prismMatAnim) prismMatAnim.cancel();
                if(prismDematAnim) prismDematAnim.cancel(); if(span1Anim) span1Anim.cancel(); if(span2Anim) span2Anim.cancel();
                
                knightText.style.opacity = '1'; knightText.style.filter = `drop-shadow(0 30px 20px rgba(0,0,0,0.9)) drop-shadow(0 0 30px var(--neon-glow))`;
                prismWrapper.style.opacity = '0'; projNum.classList.remove('lasering'); span1.style.opacity = '0'; span2.style.opacity = '0'; 
                callback(); 
            };
        }

        function newGame() {
            const t = translations[currentLang]; board = Array(10).fill().map(() => Array(10).fill(0));
            moveNumber = 0; knightPos = { row: -1, col: -1 }; tourHistory = []; 
            localStorage.removeItem('knightTourSpecterSave'); hasSavedGame = false; updateUITexts();
            createBoards(); renderBoard(); document.getElementById('current-move').textContent = '00'; document.getElementById('status').textContent = t.statusNew;
        }

        function exitToHome() { 
            isGameActive = false; cycleIdleNeon(); 
            checkSavedGame(); updateUITexts(); document.getElementById('game-screen').classList.remove('active'); document.getElementById('home-screen').classList.add('active'); 
        }
        function startGame() {
            if (!currentLang) { triggerErrorAnimation(); return; }
            isGameActive = true; if(idleAnimReq) cancelAnimationFrame(idleAnimReq);
            
            document.getElementById('home-screen').classList.remove('active'); document.getElementById('game-screen').classList.add('active');
            playRetroBeep(520, 150, 0.15, 'sine'); setTimeout(() => playRetroBeep(880, 200, 0.15, 'square'), 200); 
            if (hasSavedGame) loadSavedGame(); else newGame();
        }

        // --- INIZIALIZZAZIONE ---
        document.getElementById('best-score-display').textContent = `BEST TOUR: ${bestScore}`; 
        createLanguageButtons();
        resizeCanvas(); 
        animate(); 

    </script>
</body>
</html>
